<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SOLAR STATIC // CALCULATING DESTINY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
      :root {
        --bg-primary: #282119;
        --bg-secondary: #65371f;
        --bg-light: #e5d8bd;

        --text-primary: #e5d8bd;
        --text-secondary: rgba(229, 216, 189, 0.78);
        --text-dark: #282119;
        --text-dark-muted: rgba(40, 33, 25, 0.74);
        --text-dark-soft: rgba(40, 33, 25, 0.56);
        --text-ghost: rgba(229, 216, 189, 0.06);
        --text-dark-ghost: rgba(40, 33, 25, 0.12);

        --accent-primary: #a54d27;
        --accent-secondary: #c97338;

        --border-soft: rgba(229, 216, 189, 0.16);
        --border-strong: rgba(229, 216, 189, 0.34);
        --border-dark: rgba(40, 33, 25, 0.18);
        --border-dark-strong: rgba(40, 33, 25, 0.34);

        --surface-tint: rgba(229, 216, 189, 0.06);
        --surface-light: rgba(40, 33, 25, 0.04);

        --glow-accent: rgba(201, 115, 56, 0.22);
        --shadow-deep: rgba(0, 0, 0, 0.28);
      }

      html {
        scroll-behavior: smooth;
        background: var(--bg-primary);
      }

      body {
        cursor: none;
        font-family: 'Space Mono', monospace;
        background: var(--bg-primary);
        color: var(--text-primary);
      }

      .font-display {
        font-family: 'Syne', sans-serif;
      }
      ::selection {
        background: var(--accent-secondary);
        color: var(--bg-primary);
      }
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: var(--bg-primary); }
      ::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
        border-radius: 9999px;
      }
    </style>
  </head>
  <body class="overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
