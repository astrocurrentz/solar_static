<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 Not Found</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        background: #ffffff;
        color: #000000;
        font-family: "Syne", sans-serif;
        padding: 1.5rem;
      }

      .frame {
        width: fit-content;
        max-width: min(32rem, calc(100vw - 3rem));
        margin: 0 auto;
        text-align: center;
      }

      .glitch {
        margin: 0;
        font-size: clamp(2.4rem, 7vw, 5rem);
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        line-height: 0.92;
        text-wrap: balance;
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <h1 class="glitch">404 NOT FOUND</h1>
    </div>
    <script>
      const glitch = document.querySelector('.glitch');
      const text = '404 NOT FOUND';
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&?!<>';
      const scrambleStepMs = 30;
      const scrambleRevealStep = 1 / 3;
      const glitchIntervalMs = 3600;
      let scrambleIntervalId = null;

      const triggerGlitch = () => {
        if (!glitch) {
          return;
        }

        if (scrambleIntervalId !== null) {
          window.clearInterval(scrambleIntervalId);
        }

        let iteration = 0;

        scrambleIntervalId = window.setInterval(() => {
          glitch.textContent = text
            .split('')
            .map((character, index) => {
              if (character === ' ' || index < iteration) {
                return text[index];
              }

              return chars[Math.floor(Math.random() * chars.length)] ?? character;
            })
            .join('');

          if (iteration >= text.length) {
            glitch.textContent = text;
            window.clearInterval(scrambleIntervalId);
            scrambleIntervalId = null;
          }

          iteration += scrambleRevealStep;
        }, scrambleStepMs);
      };

      triggerGlitch();
      window.setInterval(triggerGlitch, glitchIntervalMs);
    </script>
  </body>
</html>
